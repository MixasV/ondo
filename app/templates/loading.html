<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Sirex RWA Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00d4ff',
                        dark: '#0a0e1a',
                        'dark-lighter': '#141824'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .delay-100 {
            animation-delay: 0.1s;
        }
        .delay-200 {
            animation-delay: 0.2s;
        }
    </style>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center">
    
    <div class="text-center p-12 bg-dark-lighter rounded-2xl border border-primary/30 shadow-2xl max-w-md">
        <!-- Animated Logo/Icon -->
        <div class="relative w-24 h-24 mx-auto mb-8">
            <div class="absolute inset-0 border-4 border-primary/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-4 bg-primary/10 rounded-full flex items-center justify-center">
                <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
        </div>
        
        <!-- Title -->
        <h1 class="text-3xl font-bold text-primary mb-3">Loading Data</h1>
        
        <!-- Description -->
        <p class="text-gray-400 mb-6">
            Please wait, fetching latest metrics from Dune Analytics
        </p>
        
        <!-- Progress Dots -->
        <div class="flex items-center justify-center space-x-3 mb-6">
            <span class="w-3 h-3 bg-primary rounded-full animate-pulse-slow"></span>
            <span class="w-3 h-3 bg-primary rounded-full animate-pulse-slow delay-100"></span>
            <span class="w-3 h-3 bg-primary rounded-full animate-pulse-slow delay-200"></span>
        </div>
        
        <!-- Status Text -->
        <p class="text-sm text-gray-500">
            This may take 10-20 seconds...
        </p>
    </div>
    
    <script>
        // Check if data update is complete
        let checkCount = 0;
        const maxChecks = 60; // 60 checks = 2 minutes max
        
        async function checkDataReady() {
            checkCount++;
            
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                // Check if data update is marked as complete
                const completeResponse = await fetch('/api/health');
                const healthData = await completeResponse.json();
                
                // Check if we have real data AND update is complete
                if ((data.ousg_supply > 0 || data.usdy_supply > 0) && 
                    healthData.dune_ousg?.status === 'healthy') {
                    console.log('✓ Data fully loaded, reloading page...');
                    window.location.reload();
                    return;
                }
            } catch (e) {
                console.log('Still loading...', e);
            }
            
            // Keep checking or timeout
            if (checkCount < maxChecks) {
                setTimeout(checkDataReady, 3000); // Check every 3 seconds
            } else {
                console.log('Timeout, reloading anyway...');
                window.location.reload();
            }
        }
        
        // Start checking after 10 seconds (give time for data fetch)
        setTimeout(checkDataReady, 10000);
    </script>
    
</body>
</html>
